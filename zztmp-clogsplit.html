<!doctype html>
<meta charset="utf-8" />
<title>clogged-split driver</title>
<style>
  html, body { margin: 0; height: 100%; }
  iframe { position: fixed; inset: 0; width: 100%; height: 100%; border: 0; }
  #out {
    position: fixed; left: 8px; top: 8px; z-index: 99999;
    background: #000c; color: #0f0; font: 13px/1.5 monospace;
    padding: 10px 14px; white-space: pre; border-radius: 6px;
  }
</style>
<div id="out">booting…</div>
<iframe id="app"></iframe>
<script>
  const SLOT_KEY = 'aphelion:save:v1:slot1'
  const built = ['drop-pod', 'hub', 'automation', 'logistics', 'research']
  const bld = (id, type, x, y, extra) => Object.assign(
    { id, type, pos: { x, y }, orientation: 0, manualActive: false,
      progress: 0, inputBuffer: {}, outputBuffer: {} }, extra || {})
  const belt = (id, fromId, toId, a, b) => ({
    id, from: { kind: 'building', id: fromId }, to: { kind: 'building', id: toId },
    waypoints: [], style: 'straight', path: [a, b],
    length: Math.hypot(b.x - a.x, b.y - a.y), items: [], nextItemId: 0, entryAccum: 0,
  })
  const P = { W1: { x: 60, y: 0 }, J: { x: 140, y: 0 }, O1: { x: 220, y: -60 }, S1: { x: 220, y: 60 } }
  const save = {
    v: 32,
    lastTick: Date.now(),
    hubPos: { x: 0, y: -80 },
    player: { pos: { x: 0, y: 0 }, travel: null },
    built,
    seenTutorials: built,
    researched: ['conveyor-splitter', 'conveyor-merger'],
    buildings: [
      bld('W1', 'storage', P.W1.x, P.W1.y, { storage: [{ item: 'leaves', n: '300' }] }),
      bld('J', 'conveyor-splitter', P.J.x, P.J.y),
      bld('O1', 'storage', P.O1.x, P.O1.y),
      // The clog: a smelter whose recipe (iron ingot) does not accept leaves — items ride
      // to its end and stick, packing the belt full.
      bld('S1', 'smelter', P.S1.x, P.S1.y),
    ],
    belts: [
      belt('bw1j', 'W1', 'J', P.W1, P.J),
      belt('bjo1', 'J', 'O1', P.J, P.O1),
      belt('bjs1', 'J', 'S1', P.J, P.S1),
    ],
  }
  localStorage.setItem(SLOT_KEY, JSON.stringify(save))
  localStorage.setItem('aphelion:lastSlot', '1')

  const out = document.getElementById('out')
  const lines = []
  const log = (s) => { lines.push(s); out.textContent = lines.join('\n') }

  const iframe = document.getElementById('app')
  iframe.src = '/'

  const cnt = (g, id) => {
    const b = g.buildings.find((x) => x.id === id)
    return (b.storage || []).reduce((n, sl) => (sl ? n + Number(sl.n.toString()) : n), 0)
  }
  const beltLoad = (g, id) => g.belts.find((x) => x.id === id).items.length

  let step = 0
  let ticks = 0
  let mark = null
  const timer = setInterval(() => {
    ticks++
    const doc = iframe.contentDocument
    const win = iframe.contentWindow
    if (!doc || !win) return
    try {
      if (step === 0) {
        const btn = doc.querySelector('.menu-btn-primary')
        if (!btn) return
        btn.click(); step = 1; log('clicked Continue — splitter with one clogged output')
      } else if (step === 1) {
        if (!doc.querySelector('.map-world') || !win.__game) return
        const g = win.__game.getState()
        // Wait until the clogged branch is genuinely packed AND some items reached O1,
        // then mark and measure continued flow over the next ~15 sim-seconds.
        if (!mark) {
          if (beltLoad(g, 'bjs1') >= 4 && cnt(g, 'O1') >= 3) {
            mark = { tick: ticks, o1: cnt(g, 'O1'), clog: beltLoad(g, 'bjs1') }
            log('clog established: S1-belt holds ' + mark.clog + ' items, O1 has ' + mark.o1)
          } else if (ticks > 400) { log('TIMEOUT before clog established'); clearInterval(timer) }
          return
        }
        if (ticks - mark.tick < 150) return
        const o1 = cnt(g, 'O1'), dt = (ticks - mark.tick) / 10
        const delta = o1 - mark.o1
        const rate = delta / dt * 60
        log('after ' + dt.toFixed(0) + 's more: O1 ' + mark.o1 + ' → ' + o1 +
          ' (+' + delta + ', ~' + rate.toFixed(0) + '/min)')
        log((delta >= 8 ? 'PASS' : 'FAIL') + ': flow KEEPS RUNNING to the open output')
        log((rate >= 40 ? 'PASS' : 'FAIL') + ': at (near) full belt rate, not half')
        log((beltLoad(g, 'bjs1') >= 4 ? 'PASS' : 'FAIL') +
          ': clogged branch still packed (' + beltLoad(g, 'bjs1') + ' items waiting)')
        log((cnt(g, 'J') === 0 ? 'PASS' : 'FAIL') + ': junction still buffers nothing (J=' + cnt(g, 'J') + ')')
        const inbound = beltLoad(g, 'bw1j')
        log('  inbound belt carries ' + inbound + ' items (healthy transit, not a pile-up)')
        log('DONE')
        clearInterval(timer)
      }
    } catch (err) {
      log('ERROR step ' + step + ': ' + err.message)
      clearInterval(timer)
    }
  }, 100)
</script>
